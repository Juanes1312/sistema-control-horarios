<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Virtual Llantas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 rounded-lg">
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h3 class="mb-0">Virtual Llantas</h3>
                        <p class="mb-0 small">Sistema de Control de Horarios</p>
                    </div>
                    <div class="card-body p-5 text-center">
                        <h5 class="mb-4">Hola, {{ request.user.first_name }} 👋</h5>
                        
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            <div class="d-grid gap-3">
                                <button type="submit" name="tipo" value="E" class="btn btn-success btn-lg shadow-sm">🟢 Registrar Entrada</button>
                                <div class="d-flex gap-2">
                                    <button type="submit" name="tipo" value="R" class="btn btn-warning w-100 shadow-sm">☕ Iniciar Receso</button>
                                </div>
                                <button type="submit" name="tipo" value="S" class="btn btn-danger btn-lg shadow-sm">🔴 Registrar Salida</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
